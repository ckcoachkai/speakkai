name: Deploy Astro site to GitHub Pages

on:
  push:
    branches: ["main"]
  schedule:
    - cron: "7,22,37,52 * * * *"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      GOOGLE_PUBLISHED_SHEETS_JSON: >-
        [
          {"id":260607,"title":"July 2026","url":"https://docs.google.com/spreadsheets/d/e/2PACX-1vQ8_5GzBV_NO2SBGWIQwBXkO8Jq6uVMCenblygeTLUN20y5FBIm0XQs0YKM7pshaN3A3U2E6s-qxByB/pub?gid=260607&single=true&output=csv"},
          {"id":260608,"title":"August 2026","url":"https://docs.google.com/spreadsheets/d/e/2PACX-1vQ8_5GzBV_NO2SBGWIQwBXkO8Jq6uVMCenblygeTLUN20y5FBIm0XQs0YKM7pshaN3A3U2E6s-qxByB/pub?gid=260608&single=true&output=csv"},
          {"id":260609,"title":"September 2026","url":"https://docs.google.com/spreadsheets/d/e/2PACX-1vQ8_5GzBV_NO2SBGWIQwBXkO8Jq6uVMCenblygeTLUN20y5FBIm0XQs0YKM7pshaN3A3U2E6s-qxByB/pub?gid=260609&single=true&output=csv"},
          {"id":260610,"title":"October 2026","url":"https://docs.google.com/spreadsheets/d/e/2PACX-1vQ8_5GzBV_NO2SBGWIQwBXkO8Jq6uVMCenblygeTLUN20y5FBIm0XQs0YKM7pshaN3A3U2E6s-qxByB/pub?gid=260610&single=true&output=csv"},
          {"id":260611,"title":"November 2026","url":"https://docs.google.com/spreadsheets/d/e/2PACX-1vQ8_5GzBV_NO2SBGWIQwBXkO8Jq6uVMCenblygeTLUN20y5FBIm0XQs0YKM7pshaN3A3U2E6s-qxByB/pub?gid=260611&single=true&output=csv"},
          {"id":260612,"title":"December 2026","url":"https://docs.google.com/spreadsheets/d/e/2PACX-1vQ8_5GzBV_NO2SBGWIQwBXkO8Jq6uVMCenblygeTLUN20y5FBIm0XQs0YKM7pshaN3A3U2E6s-qxByB/pub?gid=260612&single=true&output=csv"}
        ]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Pages
        uses: actions/configure-pages@v5
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install
        run: npm install
      - name: Sync approved Google Sheet tabs
        run: npm run sync:schedule
      - name: Build
        run: npm run build
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
